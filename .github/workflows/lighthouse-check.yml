name: lighthouse-check

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: read
      issues: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build client
        run: npm run client:build

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli@0.15.x

      - name: Create GitHub token for Render MCP
        run: |
          mkdir -p /home/runner/.config/opencode/.secrets
          echo "${{ secrets.RENDER_MCP_TOKEN }}" > /home/runner/.config/opencode/.secrets/render-token

      - name: Run OpenCode
        uses: anomalyco/opencode/github@latest
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
        with:
          model: opencode/deepseek-v4-flash-free
          prompt: Выполни аудит приложения с помощью Lighthouse.
            Lighthouse CLI уже установлен и конфигурационный файл .lighthouserc.json создан находится в корне проекта.
            Выполни команду lhci collect для запуска аудита и сохрани результаты в папке .lighthouseci/ с помощью actions/upload-artifact@v4.
            Загрузи отчеты в виде артефакта GitHub Actions. Укажи имя артефакта как "lighthouse-reports" и установи срок хранения на 7 дней.
