name: lighthouse-check

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install:all

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli@0.15.x

      - name: Build client
        run: npm run client:build

      - name: Create GitHub token for Render MCP
        run: |
          mkdir -p /home/runner/.config/opencode/.secrets
          echo "${{ secrets.RENDER_MCP_TOKEN }}" > /home/runner/.config/opencode/.secrets/render-token

      - name: Run OpenCode
        uses: anomalyco/opencode/github@latest
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
        with:
          model: opencode/deepseek-v4-flash-free
          prompt: Запусти аудит приложения с помощью Lighthouse CI.
            Конфигурационный файл lighthouserc.js уже создан и находится в корне проекта.
            Токен для GitHub App Lighthouse CI уже добавлен в секреты репозитория и доступен через переменную окружения LHCI_GITHUB_APP_TOKEN.
            Результаты сохрани в директорию ./lighthouseci, их заберёт следующий шаг workflow.

      - name: Upload Lighthouse reports
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-reports
          path: ./lighthouseci
          retention-days: 14
